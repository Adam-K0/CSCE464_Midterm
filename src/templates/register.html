{% extends "base.html" %}
{% block title %}Register — Congressional Debate{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto card p-6">
  <h1 class="text-xl font-bold mb-4">Register</h1>
  <form id="registerForm" class="space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">Full Name</label>
      <input type="text" id="name" class="form-input" required>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" id="email" class="form-input" required>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" id="password" class="form-input" required minlength="6">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">School</label>
      <input type="text" id="school" class="form-input" required>
    </div>
    <div id="authMsg" class="auth-msg"></div>
    <button type="submit" class="btn btn-blue w-full">Register</button>
  </form>
  <p class="text-sm text-center mt-3 text-gray-500">Already have an account? <a href="/login" class="text-blue-600 hover:underline">Login</a></p>
</div>
{% endblock %}
