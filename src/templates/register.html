{% extends "base.html" %}
{% block title %}Register — Session Buddy{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="text-center mb-6">
    <div class="w-14 h-14 bg-sb-navy rounded-full flex items-center justify-center mx-auto mb-3">
      <svg class="w-7 h-7 text-sb-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
    </div>
    <h1 class="text-2xl font-extrabold section-title">Join the Chamber</h1>
    <p class="text-sm text-gray-400 mt-1">Create your debate account</p>
  </div>
  <div class="card p-6">
    <form id="registerForm" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-sb-navy mb-1.5">Full Name</label>
        <input type="text" id="name" class="form-input" required placeholder="Jane Doe">
      </div>
      <div>
        <label class="block text-sm font-semibold text-sb-navy mb-1.5">Email</label>
        <input type="email" id="email" class="form-input" required placeholder="you@school.edu">
      </div>
      <div>
        <label class="block text-sm font-semibold text-sb-navy mb-1.5">Password</label>
        <input type="password" id="password" class="form-input" required minlength="6" placeholder="Min. 6 characters">
      </div>
      <div>
        <label class="block text-sm font-semibold text-sb-navy mb-1.5">School</label>
        <input type="text" id="school" class="form-input" required placeholder="Lincoln East High School">
      </div>
      <div id="authMsg" class="auth-msg"></div>
      <button type="submit" class="btn btn-primary w-full py-2.5 text-sm uppercase tracking-wide">Register</button>
    </form>
  </div>
  <p class="text-sm text-center mt-4 text-gray-500">Already have an account? <a href="/login" class="text-sb-navy font-semibold hover:underline">Login</a></p>
</div>
{% endblock %}
