{% extends "base.html" %}
{% block content %}

<section class="page-header">
  <h1>Create Account</h1>
  <p class="subtitle">Join eShop to start shopping</p>
</section>

<div class="auth-form">
  <form id="registerForm">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" type="text" class="form-input" placeholder="Your name" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" class="form-input" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" class="form-input" placeholder="At least 6 characters" minlength="6" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg btn-block">Register</button>
    <p id="authMsg" class="auth-msg"></p>
    <p class="auth-link">Already have an account? <a href="/login">Log in</a></p>
  </form>
</div>

{% endblock %}
