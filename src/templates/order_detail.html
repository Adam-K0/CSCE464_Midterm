{% extends "base.html" %}
{% block content %}

<!-- Back link -->
<a href="/orders" class="back-link">&larr; Back to Orders</a>

<section class="page-header">
  <h1>Order #{{ order_id }}</h1>
</section>

<!-- Order detail (populated by JS) -->
<div id="orderDetail" class="order-detail-container" data-order-id="{{ order_id }}">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading order details...</p>
  </div>
</div>

{% endblock %}
