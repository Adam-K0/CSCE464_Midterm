{% extends "base.html" %}
{% block title %}Login — Congressional Debate{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto card p-6">
  <h1 class="text-xl font-bold mb-4">Login</h1>
  <form id="loginForm" class="space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" id="email" class="form-input" required>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" id="password" class="form-input" required>
    </div>
    <div id="authMsg" class="auth-msg"></div>
    <button type="submit" class="btn btn-blue w-full">Login</button>
  </form>
  <p class="text-sm text-center mt-3 text-gray-500">No account? <a href="/register" class="text-blue-600 hover:underline">Register</a></p>
</div>
{% endblock %}
