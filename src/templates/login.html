{% extends "base.html" %}
{% block content %}

<section class="page-header">
  <h1>Log In</h1>
  <p class="subtitle">Welcome back to eShop</p>
</section>

<div class="auth-form">
  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" class="form-input" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" class="form-input" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg btn-block">Log In</button>
    <p id="authMsg" class="auth-msg"></p>
    <p class="auth-link">Don't have an account? <a href="/register">Register</a></p>
  </form>
</div>

{% endblock %}
