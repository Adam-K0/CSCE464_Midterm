{% extends "base.html" %}
{% block title %}Login — Session Buddy{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="text-center mb-6">
    <div class="w-14 h-14 bg-sb-navy rounded-full flex items-center justify-center mx-auto mb-3">
      <svg class="w-7 h-7 text-sb-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </div>
    <h1 class="text-2xl font-extrabold section-title">Welcome Back</h1>
    <p class="text-sm text-gray-400 mt-1">Sign in to your debate account</p>
  </div>
  <div class="card p-6">
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-sb-navy mb-1.5">Email</label>
        <input type="email" id="email" class="form-input" required placeholder="you@school.edu">
      </div>
      <div>
        <label class="block text-sm font-semibold text-sb-navy mb-1.5">Password</label>
        <input type="password" id="password" class="form-input" required placeholder="••••••••">
      </div>
      <div id="authMsg" class="auth-msg"></div>
      <button type="submit" class="btn btn-primary w-full py-2.5 text-sm uppercase tracking-wide">Login</button>
    </form>
  </div>
  <p class="text-sm text-center mt-4 text-gray-500">Don&rsquo;t have an account? <a href="/register" class="text-sb-navy font-semibold hover:underline">Register</a></p>
</div>
{% endblock %}
