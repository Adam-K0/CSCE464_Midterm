<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Congressional Debate{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white shadow">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-lg font-bold text-blue-700">Congress</a>
      <div class="flex items-center gap-3 text-sm">
        {% if current_user %}
          <span class="text-gray-600">{{ current_user.name }}</span>
          <a href="#" id="logoutBtn" class="text-red-600 hover:underline">Logout</a>
        {% else %}
          <a href="/login" class="text-blue-600 hover:underline">Login</a>
          <a href="/register" class="text-blue-600 hover:underline">Register</a>
        {% endif %}
        {% if is_po %}
          <a href="/po" class="text-green-700 font-semibold hover:underline">PO Dashboard</a>
          <a href="#" id="poLogoutBtn" class="text-red-600 hover:underline text-xs">(PO Logout)</a>
        {% else %}
          <a href="/po/login" class="text-gray-400 hover:underline text-xs">PO</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Main content -->
  <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-400 py-4">NSDA Congressional Debate Tracker</footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
