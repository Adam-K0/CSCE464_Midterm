{% extends "base.html" %}
{% block content %}

<section class="page-header">
  <h1>Your Cart</h1>
</section>

<!-- Cart items (populated by JS) -->
<div id="cartBox" class="cart-container">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading cart...</p>
  </div>
</div>

<!-- Cart summary & checkout (shown when cart has items) -->
<div id="cartSummary" class="cart-summary hidden">
  <div class="summary-row">
    <span>Subtotal</span>
    <span id="cartSubtotal">$0.00</span>
  </div>
  <div class="summary-row">
    <span>Shipping</span>
    <span class="free-shipping">FREE</span>
  </div>
  <hr>
  <div class="summary-row total">
    <span>Total</span>
    <span id="cartTotal">$0.00</span>
  </div>
  <button id="checkoutBtn" class="btn btn-primary btn-lg btn-block">
    Proceed to Checkout
  </button>
  <p id="checkoutMsg" class="checkout-msg"></p>
</div>

{% endblock %}
